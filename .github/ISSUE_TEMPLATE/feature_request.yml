name: Feature request
description: Suggest a focused Local Whisper improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One line describing the capability you want.
      placeholder: "Add resumable downloads for interrupted mobile model installs."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What pain point or limitation this addresses.
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - macOS app
        - CLI
        - Flutter iOS app
        - Flutter Android app
        - iOS keyboard
        - Android input method
        - Documentation
        - All surfaces
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed behavior
      description: Describe the behavior, UI, or API you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why they fall short.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, examples, prior art, or anything else relevant.
    validations:
      required: false
