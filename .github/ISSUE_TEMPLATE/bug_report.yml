name: Bug report
description: Report broken or surprising behavior in Local Whisper.
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing what broke.
      placeholder: "Recording stops correctly, but the copied transcript is empty."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The shortest path that reproduces the issue.
      placeholder: |
        1. Start recording with double-tap Right Option
        2. Speak for ~30 seconds
        3. Tap to stop
        4. Observe empty clipboard
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: The expected result.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead, including any error messages.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Local Whisper version
      description: Output of `wh version`.
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Platform and device
      description: Include OS version, device, and chip when relevant.
      placeholder: "macOS 26.0 on M4, iOS simulator, or Android emulator"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - macOS app
        - CLI
        - Flutter iOS app
        - Flutter Android app
        - iOS keyboard
        - Android input method
        - Documentation
    validations:
      required: true

  - type: dropdown
    id: engine
    attributes:
      label: Transcription engine
      options:
        - Parakeet-TDT v3
        - Qwen3-ASR
        - WhisperKit
        - Mobile model pack
        - Not sure
    validations:
      required: true

  - type: dropdown
    id: backend
    attributes:
      label: Grammar backend
      options:
        - Apple Intelligence
        - Ollama
        - LM Studio
        - None (transcription only)
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant output from `wh log`. Redact personal content.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that helps with triage.
    validations:
      required: false
